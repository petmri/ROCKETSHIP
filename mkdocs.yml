site_name: ROCKETSHIP Documentation
site_url: https://petmri.github.io/ROCKETSHIP/
repo_url: https://github.com/petmri/ROCKETSHIP
repo_name: petmri/ROCKETSHIP
docs_dir: docs
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Walkthroughs:
      - DCE Walkthrough: wiki/dce-walkthrough.md
      - DSC Walkthrough: wiki/dsc-walkthrough.md
      - Parametric Walkthrough: wiki/parametric-walkthrough.md
      - Python Walkthrough: wiki/python-walkthrough.md
  - Setup:
      - Enable GPU Acceleration: wiki/enable-gpu-acceleration.md
  - Technical Reference:
      - DCE Options: dce_options.md
      - Script Preferences Option Audit: script_preferences_option_audit.md
  - Project Management:
      - Overview: project-management/README.md
      - TODO: project-management/TODO.md
      - Completed: project-management/COMPLETED.md
      - Roadmap: project-management/ROADMAP.md
      - Porting Status: project-management/PORTING_STATUS.md
      - Batch Parity: project-management/projects/batch-parity/batch_parity.md
      - OSIPI Verification: project-management/projects/osipi-verification/osipi_summary.md
      - Qualification Packet: project-management/projects/qualification/QUALIFICATION_MERGE_PACKET.md
      - Phantom GT Status: project-management/projects/phantom-gt/PHANTOM_GT_QUALIFICATION_STATUS.md
