site_name: ROCKETSHIP Documentation
site_url: https://petmri.github.io/ROCKETSHIP/
repo_url: https://github.com/petmri/ROCKETSHIP
repo_name: petmri/ROCKETSHIP
docs_dir: docs
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Walkthroughs:
      - DCE Walkthrough: wiki/dce-walkthrough.md
      - DSC Walkthrough: wiki/dsc-walkthrough.md
      - Parametric Walkthrough: wiki/parametric-walkthrough.md
      - Python Walkthrough: wiki/python-walkthrough.md
  - Setup:
      - Enable GPU Acceleration: wiki/enable-gpu-acceleration.md
  - Technical Reference:
      - DCE Options: dce_options.md
      - Script Preferences Option Audit: script_preferences_option_audit.md
