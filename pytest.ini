[pytest]
testpaths = tests/python
python_files = test_*.py
addopts = -ra --strict-markers
markers =
    fast: Short-running tests intended for quick backend checks.
    unit: Pure logic tests with minimal IO.
    integration: Pipeline tests with filesystem/process interactions.
    parity: Python-vs-MATLAB parity checks.
    slow: Long-running tests.
    portability: Tests intended for cross-platform jobs.
    osipi: OSIPI reference-data reliability checks.
    osipi_slow: Long-running OSIPI reliability checks, gated by --osipi-slow.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
