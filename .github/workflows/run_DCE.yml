name: CI

# Controls when the workflow will run
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python_checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python tests with coverage
        run: |
          python -m pytest tests/python -q \
            --cov=python \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60

      - name: Run OSIPI primary merge-gate reliability summary
        run: |
          python tests/python/run_osipi_reliability.py \
            --suite all \
            --summary-json /tmp/osipi_primary_reliability_summary.json

      - name: Upload OSIPI primary reliability summary
        uses: actions/upload-artifact@v4
        with:
          name: osipi-primary-reliability-summary
          path: /tmp/osipi_primary_reliability_summary.json
          retention-days: 7
          if-no-files-found: error

      - name: Upload Python coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: coverage.xml
          retention-days: 7
          if-no-files-found: error

  python_portability:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python unit/integration tests (non-parity mode)
        run: python -m pytest tests/python -m "not parity" -q

  parity_checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          products: Curve_Fitting_Toolbox Image_Processing_Toolbox Optimization_Toolbox Parallel_Computing_Toolbox Statistics_and_Machine_Learning_Toolbox
          release: R2022a

      - name: Generate MATLAB parity baseline maps (downsample fixture)
        uses: matlab-actions/run-command@v2
        with:
          command: addpath .; addpath tests/matlab/; generate_dce_tofts_parity_map('subjectRoot', 'tests/data/ci_fixtures/dce/bbb_p19_downsample_x3y3', 'models', {'tofts'});

      - name: Run Python contract parity checks
        run: |
          python tests/contracts/generate_python_results.py --output /tmp/python_results.json
          python tests/contracts/compare_with_matlab_baseline.py --python-results /tmp/python_results.json --require-all

      - name: Run Python DCE pipeline parity (downsample fixture)
        run: |
          python -m pytest tests/python/test_dce_pipeline_parity_metrics.py::test_downsample_bbb_p19_tofts_ktrans \
            --run-parity \
            --dataset-root tests/data/ci_fixtures/dce/bbb_p19_downsample_x3y3 \
            -q

  matlab_checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        release: [R2020b, R2022a, latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          products: Curve_Fitting_Toolbox Image_Processing_Toolbox Optimization_Toolbox Parallel_Computing_Toolbox Statistics_and_Machine_Learning_Toolbox
          release: ${{ matrix.release }}
        
      #- name: Get MATLAB toolboxes with mpm
      #  run: |
      #    wget https://www.mathworks.com/mpm/glnxa64/mpm
      #    chmod +x mpm
      #    ./mpm install --release=${{ matrix.release }} --products MATLAB Statistics_and_Machine_Learning_Toolbox Parallel_Computing_Toolbox Curve_Fitting_Toolbox
      - name: Run T1 mapping
        uses: matlab-actions/run-command@v2
        with:
          command: addpath .; addpath dce/; addpath external_programs/; addpath external_programs/niftitools/; addpath parametric_scripts/; addpath parametric_scripts/custom_scripts/; T1mapping_fit('tests/data/BIDS_test/rawdata/sub-01/ses-01/anat/', 'tests/data/BIDS_test/derivatives/sub-01/ses-01/anat/', 'sub-01_ses-01_space-DCEref_desc-bfczunified_VFA.nii')

      - name: Run Algorithm Unit Tests
        uses: matlab-actions/run-command@v2
        with:
          command: addpath .; addpath tests/matlab/; addpath tests/matlab/helpers/; results = run_unit_tests(); assert(~any([results.Failed]), 'Unit tests failed.');

      - name: Run Algorithm Integration Tests
        uses: matlab-actions/run-command@v2
        with:
          command: addpath .; addpath tests/matlab/; addpath tests/matlab/helpers/; results = run_all_tests('suite','integration'); assert(~any([results.Failed]), 'Integration tests failed.');

      - name: Run DCE (Full)
        uses: matlab-actions/run-command@v2
        with:
          command: run_dce_cli('tests/data/BIDS_test/rawdata/sub-01/ses-01/', 'tests/data/BIDS_test/derivatives/sub-01/ses-01/')

      - name: Upload Ktrans result
        uses: actions/upload-artifact@v6
        with:
          name: Ktrans_result_${{ matrix.os }}-${{ matrix.release }}
          path: tests/data/BIDS_test/derivatives/sub-01/ses-01/dce/dce_patlak_fit_Ktrans.nii
          retention-days: 7
          if-no-files-found: error
